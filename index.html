<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Idle Bud — Game Design Document</title>
<style>html,body{margin:0;min-height:100%;background:#07100b;color:#edf7f0;font-family:Inter,system-ui,sans-serif}body{display:grid;place-items:center}main{text-align:center;padding:24px}p{opacity:.75}.error{color:#ffb4b8}</style>
</head>
<body>
<main><strong>Idle Bud</strong><p>Carregando o Game Design Document…</p></main>
<script>
(async()=>{
  const files=[
    'payload-v8/01.txt','payload-v8/02.txt','payload-v8/03.txt',
    'payload-v8/04.txt','payload-v8/05.txt','payload-v8/06.txt',
    'payload-v8/07.txt','payload-v8/08.txt','payload-v8/09.txt',
    'payload-v8/10.txt','payload-v8/11.txt'
  ];
  const parts=await Promise.all(files.map(async file=>{
    const response=await fetch(file,{cache:'no-store'});
    if(!response.ok) throw new Error(`Falha ao carregar ${file}`);
    return response.text();
  }));
  const bytes=Uint8Array.from(atob(parts.join('')),c=>c.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
  const html=await new Response(stream).text();
  document.open();document.write(html);document.close();
})().catch(error=>{
  document.querySelector('main').innerHTML='<strong>Idle Bud</strong><p class="error">Não foi possível carregar o documento neste navegador.</p>';
  console.error(error);
});
</script>
</body>
</html>
