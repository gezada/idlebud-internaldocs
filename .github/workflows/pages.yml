name: Deploy GDD to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and validate static GDD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site /tmp/gdd-build
          cat payload/*.txt \
            | tr -d '\n\r\t ' \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/gdd-build/source.html
          python3 -m py_compile scripts/build_gdd.py scripts/patch_point5_gardener.py
          python3 scripts/build_gdd.py /tmp/gdd-build/source.html _site/index.html
          python3 scripts/patch_point5_gardener.py _site/index.html
          test -s _site/index.html
          grep -q 'Game Design Document · v10' _site/index.html
          grep -q '5.7 Progressão do Jardineiro' _site/index.html
          grep -q 'Benefícios exclusivos de VIP' _site/index.html
          grep -q 'Sistemas acelerados pelo VIP' _site/index.html
          grep -q 'O nível libera sistemas. O mapa libera conteúdo. O VIP aumenta eficiência, capacidade e conforto.' _site/index.html
          grep -q 'O VIP não ignora requisitos de nível' _site/index.html
          ! grep -q 'Ainda precisa ser decidido se a conta terá um nível próprio de Jardineiro' _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
